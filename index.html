<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Instagram Content Grid</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;color:#1a1a1a;padding:14px;max-width:780px;margin:0 auto;overflow-x:hidden}
.header{display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid #e5e5e5;margin-bottom:10px;flex-wrap:wrap}
.header-title{font-size:15px;font-weight:600;flex:1;min-width:100px}
.header-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:none;border:1px solid #ddd;border-radius:8px;padding:5px 11px;cursor:pointer;font-size:12px;color:#555;display:flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit}
.btn:hover{background:#f0f0f0}
.btn-red{background:#D32F2F;color:#fff;border-color:#D32F2F}
.btn-red:hover{background:#B71C1C}
.btn-orange{background:#E65100;color:#fff;border-color:#E65100}
.btn-orange:hover{background:#BF360C}

.filters{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.ftag{font-size:12px;padding:4px 11px;border-radius:20px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;transition:all .15s}
.ftag.active{background:#D32F2F;color:#fff;border-color:#D32F2F}
.count{font-size:12px;color:#888;margin-bottom:8px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;align-items:start}
.post-card{display:flex;flex-direction:column;cursor:pointer;background:#000;border-radius:4px;overflow:hidden;border:1px solid #efefef;transition:box-shadow .15s,opacity .15s,transform .15s}
.post-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.18)}
.post-thumb{position:relative;overflow:hidden;background:#111;width:100%}
/* aspect ratios */
.ratio-45{aspect-ratio:4/5}
.ratio-11{aspect-ratio:1/1}
.ratio-916{aspect-ratio:9/16}
.post-thumb img,.post-thumb video{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;text-align:center;padding:10px;line-height:1.4;position:absolute;inset:0}
.badge-reel{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px;z-index:2}
.badge-car{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px;z-index:2}
.dot-status{position:absolute;bottom:6px;right:6px;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.8);z-index:2}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.18);z-index:1}
.play-overlay i{font-size:28px;color:#fff;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5))}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.t-ig{background:#E3F2FD;color:#1565C0}.t-reel{background:#FCE4EC;color:#880E4F}
.t-car{background:#E8F5E9;color:#1B5E20}.t-prog{background:#FFF8E1;color:#F57F17}
.t-pub{background:#E8F5E9;color:#2E7D32}.t-idea{background:#EDE7F6;color:#4527A0}
.t-def{background:#f5f5f5;color:#666}
.s-green{background:#4CAF50}.s-yellow{background:#FFC107}.s-blue{background:#2196F3}.s-gray{background:#ccc}
.bg-red{background:#D32F2F;color:#fff}.bg-brown{background:#5D4037;color:#fff}
.bg-pink{background:#FCE4EC;color:#880E4F}.bg-black{background:#212121;color:#fff}
.bg-gray{background:#ececec;color:#666}.bg-darkred{background:#B71C1C;color:#fff}
.bg-cream{background:#FFF8F0;color:#5D4037}

/* DRAG REORDER */
.reorder-mode .post-card{cursor:grab;border:1.5px solid #ddd}
.post-card.dragging{opacity:.35;transform:scale(.96);box-shadow:none!important;border-color:#D32F2F!important}
.post-card.drag-over{border:2px solid #D32F2F!important;box-shadow:0 0 0 2px rgba(211,47,47,.25)!important;transform:scale(1.03)}
.reorder-banner{display:none;background:#FFF3E0;border:1px solid #FFB74D;border-radius:8px;padding:7px 12px;font-size:12px;color:#E65100;margin-bottom:8px;align-items:center;gap:6px}
.reorder-banner.show{display:flex}
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.8;border-radius:8px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.35);transform:rotate(2deg)}

/* DETAIL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:12px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:18px;width:100%;max-width:660px;max-height:94vh;display:flex;flex-direction:row;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.4)}
@media(max-width:520px){.modal{flex-direction:column;max-height:94vh;overflow-y:auto}}
.modal-left{flex-shrink:0;width:270px;position:relative;background:#000;border-radius:18px 0 0 18px;overflow:hidden}
@media(max-width:520px){.modal-left{width:100%;border-radius:18px 18px 0 0}}
.carousel-track-wrap{width:100%;aspect-ratio:4/5;overflow:hidden;position:relative;touch-action:pan-y;user-select:none}
.carousel-track-wrap.ratio-11{aspect-ratio:1/1}
.carousel-track-wrap.ratio-916{aspect-ratio:9/16}
.carousel-track{display:flex;height:100%;transition:transform .32s cubic-bezier(.4,0,.2,1);will-change:transform}
.carousel-slide-item{flex-shrink:0;width:100%;height:100%;position:relative;overflow:hidden;background:#000}
.carousel-slide-item img{width:100%;height:100%;object-fit:cover;display:block}
.carousel-slide-item video{width:100%;height:100%;object-fit:cover;display:block;background:#000}
.car-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);color:#fff;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;z-index:10;transition:background .15s}
.car-arrow:hover{background:rgba(0,0,0,.75)}
.car-arrow.prev{left:8px}.car-arrow.next{right:8px}
.car-arrow:disabled{opacity:.2;pointer-events:none}
.car-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px;z-index:10}
.car-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;transition:all .2s}
.car-dot.active{background:#fff;width:18px;border-radius:3px}
.modal-badge-reel{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 8px;border-radius:5px;display:flex;align-items:center;gap:4px;z-index:15}
.modal-close-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:20;transition:background .15s}
.modal-close-btn:hover{background:rgba(0,0,0,.8)}
.slide-counter{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 9px;border-radius:5px;z-index:15;font-weight:600}
.modal-right{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:10px;min-width:0}
.modal-title{font-size:14px;font-weight:600;line-height:1.3}
.modal-date{font-size:12px;color:#aaa}
.modal-tag-row{display:flex;gap:5px;flex-wrap:wrap}
.section-label{font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.modal-caption{font-size:13px;color:#333;background:#f7f7f7;border-radius:8px;padding:10px 12px;line-height:1.6;white-space:pre-wrap}
.modal-hash{font-size:12px;color:#1565C0;background:#E3F2FD;border-radius:8px;padding:8px 12px;line-height:1.6;word-break:break-word}
.modal-actions{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
/* delete confirm state */
.btn-del-confirm{background:#D32F2F!important;color:#fff!important;border-color:#D32F2F!important}

/* ADD MODAL */
.add-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:16px}
.add-overlay.open{display:flex}
.add-modal{background:#fff;border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:22px;position:relative}
.add-modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 11px;font-size:13px;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#D32F2F}
.fg textarea{resize:vertical;min-height:70px}
.upload-area{border:2px dashed #ddd;border-radius:10px;padding:14px;text-align:center;cursor:pointer;color:#aaa;font-size:13px;position:relative;transition:border-color .15s}
.upload-area:hover{border-color:#D32F2F;color:#D32F2F}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-prev{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:8px;display:none;margin-top:8px}
.video-prev{width:100%;aspect-ratio:9/16;object-fit:cover;border-radius:8px;display:none;margin-top:8px;background:#000}
.cover-prev{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:8px;display:none;margin-top:8px}
.fr{display:flex;gap:10px}.fr .fg{flex:1}
.slide-row{display:flex;gap:6px;overflow-x:auto;padding:4px 0;margin-top:6px}
.slide-thumb{min-width:58px;aspect-ratio:4/5;border-radius:6px;overflow:hidden;border:1px solid #eee;background:#f0f0f0;position:relative;flex-shrink:0}
.slide-thumb img,.slide-thumb video{width:100%;height:100%;object-fit:cover}
.slide-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.45);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.add-footer{width:100%;margin-top:12px;padding:10px;border:1px dashed #ddd;border-radius:10px;background:none;cursor:pointer;color:#aaa;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit}
.add-footer:hover{background:#f5f5f5}
.tab-btns{display:flex;gap:6px;margin-bottom:10px}
.tab-btn{flex:1;padding:7px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:#666;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.tab-btn.active{border-color:#D32F2F;color:#D32F2F;background:#FFF5F5}
/* ratio picker */
.ratio-btns{display:flex;gap:6px;margin-bottom:10px}
.ratio-btn{flex:1;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:11px;font-family:inherit;color:#666;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 4px;transition:all .15s}
.ratio-btn .r-box{background:#ddd;border-radius:3px}
.ratio-btn.active{border-color:#D32F2F;color:#D32F2F;background:#FFF5F5}
.ratio-btn.active .r-box{background:#D32F2F}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#323232;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <i class="ti ti-brand-instagram" style="font-size:20px;color:#D32F2F"></i>
  <span class="header-title">Instagram Content Grid</span>
  <div class="header-actions">
    <button class="btn" onclick="exportJSON()"><i class="ti ti-download"></i> Export</button>
    <label class="btn" style="cursor:pointer">
      <i class="ti ti-upload"></i> Import
      <input type="file" accept=".json" onchange="importJSON(this)" style="display:none"/>
    </label>
    <button class="btn" id="reorderBtn" onclick="toggleReorder()"><i class="ti ti-arrows-move"></i> Riordina</button>
    <button class="btn" onclick="refresh()"><i class="ti ti-refresh"></i></button>
    <button class="btn btn-red" onclick="openAdd()"><i class="ti ti-plus"></i> Nuovo post</button>
  </div>
</div>

<div class="reorder-banner" id="reorderBanner">
  <i class="ti ti-arrows-move"></i>
  <span>Trascina i post per riordinarli</span>
  <button class="btn btn-orange" style="margin-left:auto;padding:3px 10px" onclick="toggleReorder()"><i class="ti ti-check"></i> Fine</button>
</div>

<div class="filters">
  <span class="ftag active" onclick="setFilter('all',this)">Tutti</span>
  <span class="ftag" onclick="setFilter('Reel',this)">Reel</span>
  <span class="ftag" onclick="setFilter('Carosello',this)">Carosello</span>
  <span class="ftag" onclick="setFilter('In progress',this)">In progress</span>
  <span class="ftag" onclick="setFilter('Pubblicato',this)">Pubblicato</span>
  <span class="ftag" onclick="setFilter('Idea',this)">Idea</span>
</div>

<div class="count" id="countBar">0 post</div>
<div class="grid" id="grid"></div>
<button class="add-footer" onclick="openAdd()"><i class="ti ti-plus"></i> Aggiungi post</button>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay" onclick="closeDetailEv(event)">
  <div class="modal">
    <div class="modal-left">
      <div class="carousel-track-wrap" id="carWrap">
        <div class="carousel-track" id="carTrack"></div>
        <button class="car-arrow prev" id="carPrev" onclick="carMove(-1)"><i class="ti ti-chevron-left"></i></button>
        <button class="car-arrow next" id="carNext" onclick="carMove(1)"><i class="ti ti-chevron-right"></i></button>
        <div class="car-dots" id="carDots"></div>
        <div id="reelBadge" style="display:none" class="modal-badge-reel"><i class="ti ti-player-play" style="font-size:10px"></i> Reel</div>
        <div id="slideCounter" style="display:none" class="slide-counter"></div>
      </div>
      <button class="modal-close-btn" onclick="closeDetail()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-right">
      <div>
        <div class="modal-title" id="dTitle"></div>
        <div class="modal-date" id="dDate"></div>
      </div>
      <div class="modal-tag-row" id="dTags"></div>
      <div id="dCaptionBlock">
        <div class="section-label">Caption</div>
        <div class="modal-caption" id="dCaption"></div>
      </div>
      <div id="dHashBlock" style="display:none">
        <div class="section-label">Hashtag</div>
        <div class="modal-hash" id="dHash"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="editPost()"><i class="ti ti-edit"></i> Modifica</button>
        <button class="btn" id="delBtn" onclick="handleDelete()"><i class="ti ti-trash"></i> Elimina</button>
      </div>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="add-overlay" id="addOverlay" onclick="closeAddEv(event)">
  <div class="add-modal">
    <button class="modal-close-btn" style="position:absolute;top:14px;right:14px;background:#eee;color:#333" onclick="closeAdd()"><i class="ti ti-x"></i></button>
    <h3 id="formTitle">Nuovo post</h3>

    <!-- Formato feed: ratio picker -->
    <div class="fg">
      <label>Formato feed</label>
      <div class="ratio-btns">
        <button class="ratio-btn active" id="ratio45" onclick="setRatio('4/5')">
          <div class="r-box" style="width:20px;height:25px"></div>4:5
        </button>
        <button class="ratio-btn" id="ratio11" onclick="setRatio('1/1')">
          <div class="r-box" style="width:22px;height:22px"></div>1:1
        </button>
        <button class="ratio-btn" id="ratio916" onclick="setRatio('9/16')">
          <div class="r-box" style="width:16px;height:28px"></div>9:16
        </button>
      </div>
    </div>

    <!-- Cover media -->
    <div class="fg">
      <label>Media cover</label>
      <div class="tab-btns">
        <button class="tab-btn active" id="tabImg" onclick="switchCoverTab('img')"><i class="ti ti-photo"></i> Immagine</button>
        <button class="tab-btn" id="tabVid" onclick="switchCoverTab('vid')"><i class="ti ti-video"></i> Video</button>
        <button class="tab-btn" id="tabUrl" onclick="switchCoverTab('url')"><i class="ti ti-link"></i> URL</button>
      </div>
      <div id="coverImgArea">
        <div class="upload-area">
          <i class="ti ti-cloud-upload" style="font-size:20px;display:block;margin-bottom:4px"></i>
          Clicca o trascina immagine
          <input type="file" accept="image/*" onchange="handleImg(this)"/>
        </div>
        <img id="imgPreview" class="img-prev"/>
      </div>
      <div id="coverVidArea" style="display:none">
        <div class="upload-area">
          <i class="ti ti-player-play" style="font-size:20px;display:block;margin-bottom:4px"></i>
          Carica video MP4 / MOV
          <input type="file" accept="video/*" onchange="handleVideo(this)"/>
        </div>
        <video id="videoPreview" class="video-prev" controls playsinline muted></video>
        <!-- Cover thumbnail for video -->
        <div id="coverThumbArea" style="margin-top:10px;display:none">
          <div class="section-label" style="margin-bottom:6px">Copertina feed (opzionale)</div>
          <div class="upload-area" style="padding:10px">
            <i class="ti ti-photo" style="font-size:18px;display:block;margin-bottom:3px"></i>
            Carica copertina per la griglia
            <input type="file" accept="image/*" onchange="handleCoverThumb(this)"/>
          </div>
          <img id="coverThumbPreview" class="cover-prev"/>
        </div>
      </div>
      <div id="coverUrlArea" style="display:none">
        <input type="text" id="imgUrl" placeholder="URL immagine o video (https://...)" oninput="handleUrl(this.value)" style="margin-top:4px"/>
      </div>
    </div>

    <!-- Slides carosello -->
    <div id="slidesSection" style="display:none">
      <div class="fg">
        <label>Slide aggiuntive carosello</label>
        <div class="slide-row" id="slidesPreview"></div>
        <div class="upload-area" style="margin-top:6px">
          <i class="ti ti-plus" style="font-size:16px;display:block;margin-bottom:3px"></i>
          Aggiungi slide (immagini o video)
          <input type="file" accept="image/*,video/*" multiple onchange="handleSlides(this)"/>
        </div>
      </div>
    </div>

    <div class="fg">
      <label>Titolo / idea contenuto</label>
      <input type="text" id="fTitle" placeholder="Es. Reel Ideas: Founder Story"/>
    </div>
    <div class="fr">
      <div class="fg">
        <label>Data</label>
        <input type="date" id="fDate"/>
      </div>
      <div class="fg">
        <label>Tipo</label>
        <select id="fType" onchange="onTypeChange(this.value)">
          <option value="Foto">📷 Foto</option>
          <option value="Reel">🎬 Reel</option>
          <option value="Carosello">🎠 Carosello</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label>Stato</label>
      <select id="fStatus">
        <option value="Idea">💡 Idea</option>
        <option value="In progress">⏳ In progress</option>
        <option value="Pubblicato">✅ Pubblicato</option>
      </select>
    </div>
    <div class="fg">
      <label>Caption</label>
      <textarea id="fCaption" placeholder="Scrivi la caption del post..."></textarea>
    </div>
    <div class="fg">
      <label>Hashtag</label>
      <textarea id="fHash" placeholder="#businesscoach #girlboss..." style="min-height:50px"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeAdd()">Annulla</button>
      <button class="btn btn-red" onclick="savePost()"><i class="ti ti-check"></i> Salva</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='ig_content_grid_v3';
const BGOPTS=['bg-red','bg-brown','bg-pink','bg-black','bg-gray','bg-darkred','bg-cream'];
const ICONOPTS=['ti-brand-instagram','ti-briefcase','ti-heart','ti-camera','ti-bulb','ti-star','ti-user'];

const DEFAULT_POSTS=[
  {id:1,img:'',video:'',coverImg:'',ratio:'4/5',slides:[],bg:'bg-red',icon:'',label:'GIRLS\nCLUB',title:'Reel Ideas: Founder Story',date:'2025-03-11',tags:['Instagram','In progress','Reel'],caption:'Reasons you need a business coach:\n✨ Clarify your business vision\n🎯 Set actionable, realistic goals',hash:'#businesscoach #coaching #girlboss'},
  {id:2,img:'',video:'',coverImg:'',ratio:'4/5',slides:[],bg:'bg-brown',icon:'ti-briefcase',label:'SHE\nBUSINESS',title:'She Business – Cover Post',date:'2025-03-20',tags:['Instagram','Pubblicato'],caption:'Il tuo business merita di brillare 💼',hash:'#shebusiness #businesswoman'},
  {id:3,img:'',video:'',coverImg:'',ratio:'4/5',slides:[],bg:'bg-pink',icon:'ti-book',label:"Non sei\nun libro\nchiuso",title:'Motivational Quote – Carosello',date:'2025-03-22',tags:['Instagram','Pubblicato','Carosello'],caption:'Smetti di sentirti un libro chiuso. 📖',hash:'#motivation #quotes'},
  {id:4,img:'',video:'',coverImg:'',ratio:'1/1',slides:[],bg:'bg-black',icon:'ti-user',label:'Street\nStyle',title:'Street Style – BTS Parigi',date:'2025-03-24',tags:['Instagram','Pubblicato','Reel'],caption:'Shooting a Parigi 🇫🇷',hash:'#paris #streetstyle'},
  {id:5,img:'',video:'',coverImg:'',ratio:'4/5',slides:[],bg:'bg-gray',icon:'ti-list',label:'Track\nList Q2',title:'Track List – Contenuti Q2',date:'2025-03-26',tags:['Instagram','In progress'],caption:'Pianificazione contenuti del secondo trimestre.',hash:''},

  {id:7,img:'',video:'',coverImg:'',ratio:'4/5',slides:[],bg:'bg-darkred',icon:'ti-armchair',label:'Red\nChair',title:'Red Chair – Dark Version',date:'2025-04-07',tags:['Instagram','Idea'],caption:'Variante scura del prop shoot.',hash:''},
  {id:8,img:'',video:'',coverImg:'',ratio:'9/16',slides:[],bg:'bg-red',icon:'',label:'GIRLS\nCLUB',title:'Girls Club – Second Drop',date:'2025-04-10',tags:['Instagram','In progress','Reel'],caption:'Secondo drop del format Girls Club.',hash:'#girlsclub'},
  {id:9,img:'',video:'',coverImg:'',ratio:'4/5',slides:[],bg:'bg-cream',icon:'ti-bulb',label:'Idea\nBTS',title:'Behind the Scenes – Studio Day',date:'2025-04-15',tags:['Instagram','Idea','Carosello'],caption:'Giornata in studio!',hash:'#bts'},
];

function loadPosts(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){const p=JSON.parse(raw);if(Array.isArray(p.posts)&&p.posts.length>0)return{posts:p.posts,nextId:p.nextId||p.posts.reduce((m,x)=>Math.max(m,x.id),0)+1};}
  }catch(e){}
  return{posts:DEFAULT_POSTS.map(p=>({coverImg:'',...p})),nextId:10};
}
function savePosts(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({posts,nextId}));}catch(e){}}

const loaded=loadPosts();
let posts=loaded.posts;
let nextId=loaded.nextId;
let filtered=[...posts];
let activePostId=null,editMode=false;
let currentImg='',currentVideo='',currentCoverImg='',currentSlides=[],coverTab='img',currentRatio='4/5';
let carIdx=0,carSlides=[];

/* ── EXPORT / IMPORT ── */
function exportJSON(){
  const blob=new Blob([JSON.stringify({posts,nextId,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ig_backup.json';a.click();URL.revokeObjectURL(a.href);
  showToast('Backup esportato ✓');
}
function importJSON(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!Array.isArray(d.posts))throw new Error('Formato non valido');
      posts=d.posts.map(p=>({coverImg:'',...p}));
      nextId=d.nextId||posts.reduce((m,p)=>Math.max(m,p.id),0)+1;
      filtered=[...posts];savePosts();resetFilters();renderGrid();
      showToast(`${posts.length} post importati ✓`);
    }catch(err){alert('Errore: '+err.message);}
  };
  r.readAsText(f);inp.value='';
}

/* ── TOAST ── */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2500);}

/* ── UTILS ── */
function isVideo(src){return src&&(src.startsWith('data:video')||/\.(mp4|mov|webm|ogg)(\?|$)/i.test(src));}
function ratioClass(r){return{['4/5']:'ratio-45',['1/1']:'ratio-11',['9/16']:'ratio-916'}[r]||'ratio-45';}
function tagClass(t){return{Reel:'tag t-reel',Carosello:'tag t-car','In progress':'tag t-prog',Pubblicato:'tag t-pub',Idea:'tag t-idea'}[t]||'tag t-def';}
function statusClass(tags){return tags.includes('Pubblicato')?'s-green':tags.includes('In progress')?'s-yellow':tags.includes('Idea')?'s-blue':'s-gray';}
function fmtDate(d){if(!d)return'';try{return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}}

function thumbContent(p){
  // grid thumb: prefer coverImg for videos, else video, else img, else placeholder
  if(p.coverImg) return`<img src="${p.coverImg}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0"/>`;
  if(p.video) return`<video src="${p.video}" muted playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0"></video>`;
  if(p.img) return`<img src="${p.img}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0"/>`;
  return`<div class="placeholder ${p.bg}">${p.icon?`<i class="ti ${p.icon}" style="font-size:26px;margin-bottom:6px"></i>`:''}<span style="white-space:pre-line;line-height:1.3">${p.label}</span></div>`;
}

/* ── GRID ── */
function renderGrid(){
  document.getElementById('countBar').textContent=filtered.length+' post';
  document.getElementById('grid').innerHTML=filtered.map(p=>`
    <div class="post-card" data-id="${p.id}" onclick="if(!reorderMode)openDetail(${p.id})">
      <div class="post-thumb ratio-45">
        ${thumbContent(p)}
        ${p.tags.includes('Reel')?`<div class="badge-reel"><i class="ti ti-player-play" style="font-size:9px"></i> Reel</div>`:''}
        ${p.tags.includes('Carosello')?`<div class="badge-car"><i class="ti ti-layout-columns" style="font-size:9px"></i>${p.slides&&p.slides.length?` ${p.slides.length+1}`:''}</div>`:''}
        ${(p.tags.includes('Reel')||p.video)?`<div class="play-overlay"><i class="ti ti-player-play-filled"></i></div>`:''}
        <div class="dot-status ${statusClass(p.tags)}"></div>
      </div>
    </div>`).join('');
}

function setFilter(f,el){
  document.querySelectorAll('.ftag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  filtered=f==='all'?[...posts]:posts.filter(p=>p.tags.includes(f));
  renderGrid();attachDrag();
}
function resetFilters(){
  document.querySelectorAll('.ftag').forEach((t,i)=>t.classList.toggle('active',i===0));
  filtered=[...posts];
}

/* ── CAROUSEL ── */
function buildCarousel(p){
  carSlides=[];
  if(p.video) carSlides.push({type:'video',src:p.video});
  else carSlides.push({type:p.img?'img':'placeholder',src:p.img,bg:p.bg,icon:p.icon,label:p.label});
  (p.slides||[]).forEach(s=>carSlides.push(isVideo(s)?{type:'video',src:s}:{type:'img',src:s}));
  carIdx=0;renderCarousel();
}
function renderCarousel(){
  const track=document.getElementById('carTrack');
  track.innerHTML=carSlides.map((s,i)=>{
    if(s.type==='video') return`<div class="carousel-slide-item"><video src="${s.src}" controls playsinline ${i===0?'autoplay':''} loop></video></div>`;
    if(s.type==='img') return`<div class="carousel-slide-item"><img src="${s.src}"/></div>`;
    return`<div class="carousel-slide-item"><div class="placeholder ${s.bg}">${s.icon?`<i class="ti ${s.icon}" style="font-size:34px;margin-bottom:10px"></i>`:''}<span style="white-space:pre-line;line-height:1.3;font-size:15px">${s.label}</span></div></div>`;
  }).join('');
  updateCarPos(false);
  const many=carSlides.length>1;
  const dots=document.getElementById('carDots');
  if(many){dots.innerHTML=carSlides.map((_,i)=>`<div class="car-dot${i===0?' active':''}" onclick="goSlide(${i})"></div>`).join('');dots.style.display='flex';}
  else dots.style.display='none';
  const ctr=document.getElementById('slideCounter');
  if(many){ctr.textContent=`1 / ${carSlides.length}`;ctr.style.display='block';}
  else ctr.style.display='none';
  ['carPrev','carNext'].forEach(id=>document.getElementById(id).style.display=many?'flex':'none');
  initSwipe();
}
function updateCarPos(animate=true){
  const track=document.getElementById('carTrack');
  track.style.transition=animate?'transform .32s cubic-bezier(.4,0,.2,1)':'none';
  track.style.transform=`translateX(${-carIdx*100}%)`;
  document.getElementById('carPrev').disabled=carIdx===0;
  document.getElementById('carNext').disabled=carIdx===carSlides.length-1;
  document.querySelectorAll('.car-dot').forEach((d,i)=>d.classList.toggle('active',i===carIdx));
  const ctr=document.getElementById('slideCounter');
  if(ctr.style.display!=='none') ctr.textContent=`${carIdx+1} / ${carSlides.length}`;
  document.querySelectorAll('#carTrack video').forEach((v,i)=>{if(i===carIdx)v.play().catch(()=>{});else v.pause();});
}
function carMove(dir){carIdx=Math.max(0,Math.min(carSlides.length-1,carIdx+dir));updateCarPos();}
function goSlide(i){carIdx=i;updateCarPos();}
function initSwipe(){
  const wrap=document.getElementById('carWrap');let sx=0,sy=0,drag=false;
  wrap.onpointerdown=e=>{sx=e.clientX;sy=e.clientY;drag=true;wrap.setPointerCapture(e.pointerId);};
  wrap.onpointerup=e=>{if(!drag)return;drag=false;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>30)carMove(dx<0?1:-1);};
  wrap.onpointercancel=()=>{drag=false;};
}

/* ── DETAIL MODAL ── */
function openDetail(id){
  const p=posts.find(x=>x.id===id);if(!p)return;
  activePostId=id;
  // apply ratio to modal carousel
  const wrap=document.getElementById('carWrap');
  wrap.className='carousel-track-wrap '+ratioClass(p.ratio||'4/5');
  // reset delete button
  const delBtn=document.getElementById('delBtn');
  delBtn.className='btn';delBtn.innerHTML='<i class="ti ti-trash"></i> Elimina';delBtn._confirm=false;
  buildCarousel(p);
  document.getElementById('reelBadge').style.display=p.tags.includes('Reel')||p.video?'flex':'none';
  document.getElementById('dTitle').textContent=p.title;
  document.getElementById('dDate').textContent=fmtDate(p.date);
  document.getElementById('dTags').innerHTML=p.tags.filter(t=>t!=='Instagram').map(t=>`<span class="${tagClass(t)}">${t}</span>`).join('');
  document.getElementById('dCaption').textContent=p.caption||'–';
  const hb=document.getElementById('dHashBlock');
  if(p.hash){document.getElementById('dHash').textContent=p.hash;hb.style.display='block';}else{hb.style.display='none';}
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetailEv(e){if(e.target===document.getElementById('detailOverlay'))closeDetail();}
function closeDetail(){
  document.querySelectorAll('#carTrack video').forEach(v=>v.pause());
  document.getElementById('detailOverlay').classList.remove('open');
  activePostId=null;
}

/* ── DELETE with 2-step confirm (no confirm() dialog) ── */
function handleDelete(){
  const btn=document.getElementById('delBtn');
  if(!btn._confirm){
    btn._confirm=true;
    btn.className='btn btn-del-confirm';
    btn.innerHTML='<i class="ti ti-alert-triangle"></i> Sicura? Clicca ancora';
    clearTimeout(btn._to);
    btn._to=setTimeout(()=>{btn._confirm=false;btn.className='btn';btn.innerHTML='<i class="ti ti-trash"></i> Elimina';},3000);
  }else{
    clearTimeout(btn._to);
    posts=posts.filter(x=>x.id!==activePostId);
    filtered=filtered.filter(x=>x.id!==activePostId);
    savePosts();closeDetail();renderGrid();attachDrag();
    showToast('Post eliminato');
  }
}

function editPost(){
  const p=posts.find(x=>x.id===activePostId);if(!p)return;
  closeDetail();editMode=true;
  currentImg=p.img||'';currentVideo=p.video||'';currentCoverImg=p.coverImg||'';
  currentSlides=[...(p.slides||[])];currentRatio=p.ratio||'4/5';
  document.getElementById('formTitle').textContent='Modifica post';
  document.getElementById('fTitle').value=p.title;
  document.getElementById('fDate').value=p.date;
  document.getElementById('fType').value=p.tags.includes('Reel')?'Reel':p.tags.includes('Carosello')?'Carosello':'Foto';
  document.getElementById('fStatus').value=p.tags.includes('Pubblicato')?'Pubblicato':p.tags.includes('In progress')?'In progress':'Idea';
  document.getElementById('fCaption').value=p.caption||'';
  document.getElementById('fHash').value=p.hash||'';
  document.getElementById('imgUrl').value='';
  setRatio(currentRatio);
  if(currentVideo){switchCoverTab('vid');const v=document.getElementById('videoPreview');v.src=currentVideo;v.style.display='block';document.getElementById('coverThumbArea').style.display='block';if(currentCoverImg){const ci=document.getElementById('coverThumbPreview');ci.src=currentCoverImg;ci.style.display='block';}}
  else if(currentImg){switchCoverTab('img');const i=document.getElementById('imgPreview');i.src=currentImg;i.style.display='block';}
  else switchCoverTab('img');
  onTypeChange(document.getElementById('fType').value);
  renderSlidesPreview();
  document.getElementById('addOverlay').classList.add('open');
}

/* ── ADD MODAL ── */
function openAdd(){
  editMode=false;currentImg='';currentVideo='';currentCoverImg='';currentSlides=[];currentRatio='4/5';activePostId=null;
  document.getElementById('formTitle').textContent='Nuovo post';
  ['fTitle','fCaption','fHash','imgUrl'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fDate').value='';
  document.getElementById('fType').value='Foto';
  document.getElementById('fStatus').value='Idea';
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('videoPreview').style.display='none';
  document.getElementById('coverThumbPreview').style.display='none';
  document.getElementById('coverThumbArea').style.display='none';
  setRatio('4/5');switchCoverTab('img');onTypeChange('Foto');renderSlidesPreview();
  document.getElementById('addOverlay').classList.add('open');
}
function closeAdd(){document.getElementById('addOverlay').classList.remove('open');}
function closeAddEv(e){if(e.target===document.getElementById('addOverlay'))closeAdd();}

/* ratio */
function setRatio(r){
  currentRatio=r;
  const map={'4/5':'ratio45','1/1':'ratio11','9/16':'ratio916'};
  Object.keys(map).forEach(k=>document.getElementById(map[k]).classList.toggle('active',k===r));
}

/* cover tab */
function switchCoverTab(tab){
  ['img','vid','url'].forEach(t=>{
    document.getElementById('tab'+{img:'Img',vid:'Vid',url:'Url'}[t]).classList.toggle('active',t===tab);
    const area=document.getElementById('cover'+{img:'Img',vid:'Vid',url:'Url'}[t]+'Area');
    if(area)area.style.display=t===tab?'block':'none';
  });
}
function handleImg(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{currentImg=e.target.result;currentVideo='';currentCoverImg='';const i=document.getElementById('imgPreview');i.src=currentImg;i.style.display='block';};r.readAsDataURL(f);
}
function handleVideo(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{currentVideo=e.target.result;currentImg='';const v=document.getElementById('videoPreview');v.src=currentVideo;v.style.display='block';document.getElementById('coverThumbArea').style.display='block';};r.readAsDataURL(f);
}
function handleCoverThumb(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{currentCoverImg=e.target.result;const ci=document.getElementById('coverThumbPreview');ci.src=currentCoverImg;ci.style.display='block';};r.readAsDataURL(f);
}
function handleUrl(v){
  if(!v)return;
  if(isVideo(v)){currentVideo=v;currentImg='';document.getElementById('coverThumbArea').style.display='block';}
  else{currentImg=v;currentVideo='';}
}
function handleSlides(inp){
  Array.from(inp.files).forEach(f=>{const r=new FileReader();r.onload=e=>{currentSlides.push(e.target.result);renderSlidesPreview();};r.readAsDataURL(f);});
}
function removeSlide(i){currentSlides.splice(i,1);renderSlidesPreview();}
function renderSlidesPreview(){
  document.getElementById('slidesPreview').innerHTML=currentSlides.map((s,i)=>`
    <div class="slide-thumb">${isVideo(s)?`<video src="${s}" muted></video>`:`<img src="${s}"/>`}
    <button class="slide-del" onclick="removeSlide(${i})"><i class="ti ti-x" style="font-size:8px"></i></button></div>`).join('');
}
function onTypeChange(v){
  document.getElementById('slidesSection').style.display=v==='Carosello'?'block':'none';
  if(v==='Reel'&&document.getElementById('tabVid').classList.contains('active')===false) switchCoverTab('vid');
}

function savePost(){
  const title=document.getElementById('fTitle').value.trim()||'Nuovo post';
  const date=document.getElementById('fDate').value;
  const type=document.getElementById('fType').value;
  const status=document.getElementById('fStatus').value;
  const caption=document.getElementById('fCaption').value.trim();
  const hash=document.getElementById('fHash').value.trim();
  const tags=['Instagram',status,...(type!=='Foto'?[type]:[])];
  const obj={title,date,tags,caption,hash,img:currentImg,video:currentVideo,coverImg:currentCoverImg,slides:currentSlides,ratio:currentRatio};
  if(editMode&&activePostId){
    const p=posts.find(x=>x.id===activePostId);
    if(p)Object.assign(p,obj);
    showToast('Post aggiornato ✓');
  }else{
    const bg=BGOPTS[nextId%BGOPTS.length];
    const icon=ICONOPTS[nextId%ICONOPTS.length];
    const label=title.split(' ').slice(0,2).join('\n');
    posts.unshift({id:nextId++,...obj,bg,icon,label,pinned:false});
    showToast('Post aggiunto ✓');
  }
  savePosts();filtered=[...posts];resetFilters();closeAdd();renderGrid();attachDrag();
}

function refresh(){const g=document.getElementById('grid');g.style.opacity='.4';setTimeout(()=>{g.style.opacity='1';renderGrid();attachDrag();},300);}

/* ── REORDER ── */
let reorderMode=false,dragSrcId=null;
function toggleReorder(){
  reorderMode=!reorderMode;
  document.getElementById('reorderBtn').classList.toggle('btn-orange',reorderMode);
  document.getElementById('reorderBanner').classList.toggle('show',reorderMode);
  document.getElementById('grid').classList.toggle('reorder-mode',reorderMode);
  if(reorderMode){resetFilters();renderGrid();showToast('Trascina per riordinare');}
  attachDrag();
}
function attachDrag(){
  document.querySelectorAll('.post-card').forEach(card=>{
    card.draggable=reorderMode;
    card.ondragstart=reorderMode?onDragStart:null;
    card.ondragover=reorderMode?onDragOver:null;
    card.ondragleave=reorderMode?onDragLeave:null;
    card.ondrop=reorderMode?onDrop:null;
    card.ondragend=reorderMode?onDragEnd:null;
    card.ontouchstart=reorderMode?onTouchStart:null;
  });
}
function onDragStart(e){dragSrcId=+this.dataset.id;this.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function onDragOver(e){if(!reorderMode)return;e.preventDefault();document.querySelectorAll('.post-card').forEach(c=>c.classList.remove('drag-over'));this.classList.add('drag-over');}
function onDragLeave(){this.classList.remove('drag-over');}
function onDrop(e){e.preventDefault();const tid=+this.dataset.id;if(dragSrcId!==tid)swapPosts(dragSrcId,tid);}
function onDragEnd(){document.querySelectorAll('.post-card').forEach(c=>c.classList.remove('dragging','drag-over'));dragSrcId=null;}
let touchGhost=null,touchSrcId=null,touchLastTarget=null;
function onTouchStart(e){
  if(!reorderMode)return;
  touchSrcId=+this.dataset.id;
  const rect=this.getBoundingClientRect(),t=e.touches[0];
  touchGhost=this.cloneNode(true);touchGhost.className='drag-ghost';
  touchGhost.style.cssText=`width:${rect.width}px;height:${rect.height}px;left:${t.clientX-rect.width/2}px;top:${t.clientY-rect.height/2}px`;
  document.body.appendChild(touchGhost);this.classList.add('dragging');
  document.addEventListener('touchmove',onTouchMove,{passive:false});
  document.addEventListener('touchend',onTouchEnd);
}
function onTouchMove(e){
  e.preventDefault();const t=e.touches[0];
  if(touchGhost){touchGhost.style.left=(t.clientX-touchGhost.offsetWidth/2)+'px';touchGhost.style.top=(t.clientY-touchGhost.offsetHeight/2)+'px';}
  touchGhost.style.display='none';const el=document.elementFromPoint(t.clientX,t.clientY);touchGhost.style.display='';
  const card=el&&el.closest('.post-card');
  document.querySelectorAll('.post-card').forEach(c=>c.classList.remove('drag-over'));
  if(card&&card.dataset.id&&+card.dataset.id!==touchSrcId){card.classList.add('drag-over');touchLastTarget=+card.dataset.id;}else touchLastTarget=null;
}
function onTouchEnd(){
  document.removeEventListener('touchmove',onTouchMove);document.removeEventListener('touchend',onTouchEnd);
  if(touchGhost){touchGhost.remove();touchGhost=null;}
  document.querySelectorAll('.post-card').forEach(c=>c.classList.remove('dragging','drag-over'));
  if(touchSrcId&&touchLastTarget&&touchSrcId!==touchLastTarget)swapPosts(touchSrcId,touchLastTarget);
  touchSrcId=null;touchLastTarget=null;
}
function swapPosts(aId,bId){
  const ai=posts.findIndex(p=>p.id===aId),bi=posts.findIndex(p=>p.id===bId);
  if(ai<0||bi<0)return;
  [posts[ai],posts[bi]]=[posts[bi],posts[ai]];
  filtered=[...posts];savePosts();renderGrid();attachDrag();
}

renderGrid();
</script>
